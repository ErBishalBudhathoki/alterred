name: Build and Deploy Backend to Cloud Run

on:
  push:
    branches: ["main"]

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: australia-southeast1
  GAR_LOCATION: australia-southeast1
  ARTIFACT_REPO: ${{ vars.ARTIFACT_REPO }}
  SERVICE_NAME: neuropilot-api

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}
      - run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev
      - name: Build and push image
        shell: bash
        run: |
          IMAGE="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
      - id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ env.SERVICE_NAME }}
          image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          region: ${{ env.REGION }}
          allow_unauthenticated: true
          env_vars: |
            PYTHONUNBUFFERED=1
            FIREBASE_PROJECT_ID=${{ env.PROJECT_ID }}
          memory: 1Gi
          cpu: 1
          concurrency: 80
          min_instances: 1
          max_instances: 10
          timeout: 300
          vpc_connector: serverless-connector
          service_account: cloud-run-neuropilot@${{ env.PROJECT_ID }}.iam.gserviceaccount.com
      - name: Output URL
        run: echo "Service URL: ${{ steps.deploy.outputs.url }}"

      - name: E2E health check
        shell: bash
        run: |
          URL="${{ steps.deploy.outputs.url }}"
          echo "Checking ${URL}/health"
          sleep 10
          http_code=$(curl -s -o /dev/null -w "%{http_code}" "${URL}/health")
          if [ "$http_code" != "200" ]; then
            echo "Health check failed with HTTP $http_code" && exit 1
          fi
          echo "Health check passed"

      - name: Create/update uptime check
        shell: bash
        run: |
          URL="${{ steps.deploy.outputs.url }}"
          NAME="neuropilot-api-uptime"
          gcloud services enable monitoring.googleapis.com || true
          gcloud monitoring uptime-checks describe "$NAME" && EXISTS=1 || EXISTS=0
          if [ "$EXISTS" -eq 1 ]; then
            gcloud monitoring uptime-checks update "$NAME" --path="/health" --checker-type=STATIC_IP --http-check "$(echo $URL | sed 's#https://##g')"
          else
            HOST=$(echo $URL | sed 's#https://##g')
            gcloud monitoring uptime-checks create http "$NAME" --host="$HOST" --path="/health" --display-name="Neuropilot API Uptime"
          fi
