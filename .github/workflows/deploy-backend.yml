name: Build and Deploy Backend to Cloud Run

on:
  push:
    branches: ["main"]

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: australia-southeast1
  GAR_LOCATION: australia-southeast1
  ARTIFACT_REPO: ${{ vars.ARTIFACT_REPO }}
  SERVICE_NAME: neuropilot-api

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}
      - run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev
      - name: Build and push image
        shell: bash
        run: |
          IMAGE="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
      - id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ env.SERVICE_NAME }}
          image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          region: ${{ env.REGION }}
          allow_unauthenticated: true
          env_vars: |
            PYTHONUNBUFFERED=1
      - name: Output URL
        run: echo "Service URL: ${{ steps.deploy.outputs.url }}"
