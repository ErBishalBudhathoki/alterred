name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Require deployment concurrency control
concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.REGION }}
  SERVICE_NAME: neuropilot-api
  FIREBASE_PROJECT: ${{ vars.FIREBASE_PROJECT_ID || vars.GCP_PROJECT_ID }}

jobs:
  validate-production-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Validate Production Secrets
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
        run: |
          echo "🔍 Validating production environment secrets..."
          
          # Check that all required secrets are present
          MISSING_SECRETS=()
          
          if [ -z "$FIREBASE_API_KEY" ]; then
            MISSING_SECRETS+=("FIREBASE_API_KEY")
          fi
          if [ -z "$FIREBASE_PROJECT_ID" ]; then
            MISSING_SECRETS+=("FIREBASE_PROJECT_ID")
          fi
          if [ -z "$GOOGLE_API_KEY" ]; then
            MISSING_SECRETS+=("GOOGLE_API_KEY")
          fi
          if [ -z "$ENCRYPTION_KEY" ]; then
            MISSING_SECRETS+=("ENCRYPTION_KEY")
          fi
          if [ -z "$ADMIN_API_TOKEN" ]; then
            MISSING_SECRETS+=("ADMIN_API_TOKEN")
          fi
          if [ -z "$GOOGLE_OAUTH_CLIENT_ID" ]; then
            MISSING_SECRETS+=("GOOGLE_OAUTH_CLIENT_ID")
          fi
          if [ -z "$GOOGLE_OAUTH_CLIENT_SECRET" ]; then
            MISSING_SECRETS+=("GOOGLE_OAUTH_CLIENT_SECRET")
          fi
          
          if [ ${#MISSING_SECRETS[@]} -gt 0 ]; then
            echo "❌ Missing required secrets:"
            for secret in "${MISSING_SECRETS[@]}"; do
              echo "  - $secret"
            done
            exit 1
          fi
          
          echo "✅ All production secrets are present"

  deploy:
    needs: validate-production-secrets
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: '${{ vars.WIF_PROVIDER }}'
          service_account: '${{ vars.WIF_SERVICE_ACCOUNT }}'
          create_credentials_file: true

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # Backend Deployment
      - name: Authorize Docker push
        run: gcloud auth configure-docker

      - name: Build and Push Backend Container
        run: |
          IMAGE_TAG="gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          docker build -t "${IMAGE_TAG}" .
          docker push "${IMAGE_TAG}"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV

      - name: Deploy Backend to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE_TAG }}
          flags: '--allow-unauthenticated --timeout=300 --cpu=2 --memory=2Gi --max-instances=10 --cpu-throttling --startup-cpu-boost'
          env_vars: |
            PORT=8080
            FIREBASE_PROJECT_ID=${{ env.PROJECT_ID }}
            GCP_PROJECT_ID=${{ vars.GCP_PROJECT_ID }}
            GCP_LOCATION=${{ vars.REGION }}
            GOOGLE_CLOUD_PROJECT=${{ vars.GCP_PROJECT_ID }}
            GOOGLE_CLOUD_LOCATION=${{ vars.REGION }}
            VERTEX_AI_PROJECT_ID=${{ env.PROJECT_ID }}
            VERTEX_AI_LOCATION=${{ env.REGION }}
            FORCE_VERTEX_AI=${{ vars.FORCE_VERTEX_AI }}
            DEFAULT_MODEL=${{ vars.DEFAULT_MODEL }}
            GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
            GOOGLE_OAUTH_CLIENT_ID=${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
            GOOGLE_OAUTH_CLIENT_SECRET=${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
            ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}
            OAUTH_REDIRECT_URI=${{ vars.OAUTH_REDIRECT_URI }}
            CALENDAR_MCP_TOKEN=${{ secrets.CALENDAR_MCP_TOKEN }}
            ALLOW_MCP_TOKEN_QUERY=true
            GOOGLE_CALENDAR_MCP_TOKEN_PATH=/tmp/google-calendar-mcp-tokens.json
            ADMIN_API_TOKEN=${{ secrets.ADMIN_API_TOKEN }}
            ENVIRONMENT=production

      - name: Verify Cloud Run service
        run: |
          echo "🔍 Verifying Cloud Run deployment..."
          
          # Get the service URL
          SERVICE_URL=$(gcloud run services describe "${{ env.SERVICE_NAME }}" --region "${{ env.REGION }}" --format="value(status.url)")
          
          if [ -z "$SERVICE_URL" ]; then
            echo "❌ Failed to get service URL"
            exit 1
          fi
          
          echo "✅ Service URL: $SERVICE_URL"
          
          # Test the health endpoint
          echo "🔍 Testing health endpoint..."
          if curl -f -s --max-time 30 "$SERVICE_URL/health" > /dev/null; then
            echo "✅ Health check passed"
          else
            echo "⚠️  Health check failed, but service is deployed"
            echo "   This might be due to startup time or configuration issues"
            echo "   Check the Cloud Run logs for more details"
          fi
          
          # Get recent logs for debugging
          echo "📋 Recent service logs:"
          gcloud logs read "resource.type=cloud_run_revision AND resource.labels.service_name=${{ env.SERVICE_NAME }}" --limit=10 --format="table(timestamp,severity,textPayload)" || echo "Could not fetch logs"

      # Frontend Deployment
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Flutter Dependencies
        working-directory: frontend/flutter_neuropilot
        run: flutter pub get

      - name: Build Web App
        working-directory: frontend/flutter_neuropilot
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}
        run: |
          flutter build web --release \
            --dart-define=API_BASE_URL=/api \
            --dart-define=FLUTTER_WEB_USE_SKIA=false \
            --dart-define=FIREBASE_API_KEY=${FIREBASE_API_KEY} \
            --dart-define=FIREBASE_APP_ID=${FIREBASE_APP_ID} \
            --dart-define=FIREBASE_MESSAGING_SENDER_ID=${FIREBASE_MESSAGING_SENDER_ID} \
            --dart-define=FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID} \
            --dart-define=FIREBASE_AUTH_DOMAIN=${FIREBASE_AUTH_DOMAIN} \
            --dart-define=FIREBASE_STORAGE_BUCKET=${FIREBASE_STORAGE_BUCKET} \
            --dart-define=FIREBASE_MEASUREMENT_ID=${FIREBASE_MEASUREMENT_ID} \
            --dart-define=ENVIRONMENT=production

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Frontend to Firebase Hosting
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
        run: |
          firebase deploy --only hosting --project ${{ env.PROJECT_ID }}
