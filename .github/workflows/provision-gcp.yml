name: Provision GCP Infra (aus-southeast1)

on:
  workflow_dispatch:
    inputs:
      create_cloudsql:
        description: Create Cloud SQL Postgres
        type: boolean
        default: true
      create_redis:
        description: Create Memorystore Redis
        type: boolean
        default: true
      create_vpc_connector:
        description: Create Serverless VPC Connector
        type: boolean
        default: true

jobs:
  provision:
    runs-on: ubuntu-latest
    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      REGION: ${{ vars.REGION }}
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}
      - name: Enable APIs
        run: |
          gcloud services enable run.googleapis.com sqladmin.googleapis.com vpcaccess.googleapis.com compute.googleapis.com redis.googleapis.com monitoring.googleapis.com logging.googleapis.com artifactregistry.googleapis.com iamcredentials.googleapis.com

      - name: Get project number
        id: proj
        run: |
          NUM=$(gcloud projects describe "${PROJECT_ID}" --format="value(projectNumber)")
          echo "num=${NUM}" >> $GITHUB_OUTPUT

      - name: Create Cloud SQL (Postgres)
        if: ${{ inputs.create_cloudsql }}
        run: |
          INSTANCE=neuropilot-postgres
          gcloud sql instances describe "$INSTANCE" --project "${PROJECT_ID}" || \
          gcloud sql instances create "$INSTANCE" \
            --database-version=POSTGRES_14 \
            --tier=db-custom-1-3840 \
            --region="${REGION}" \
            --storage-auto-increase \
            --root-password=$(openssl rand -base64 18)
          gcloud sql databases describe neuropilot --instance "$INSTANCE" || \
          gcloud sql databases create neuropilot --instance "$INSTANCE"
          SA="${{ steps.proj.outputs.num }}-compute@developer.gserviceaccount.com"
          gcloud projects add-iam-policy-binding "${PROJECT_ID}" \
            --member="serviceAccount:${SA}" \
            --role="roles/cloudsql.client"

      - name: Create Memorystore (Redis)
        if: ${{ inputs.create_redis }}
        run: |
          REDIS=neuropilot-redis
          gcloud redis instances describe "$REDIS" --region "${REGION}" || \
          gcloud redis instances create "$REDIS" --region "${REGION}" --tier=BASIC --size=1

      - name: Create Serverless VPC Connector
        if: ${{ inputs.create_vpc_connector }}
        run: |
          CONNECTOR=serverless-connector
          gcloud compute networks describe default || gcloud compute networks create default --subnet-mode=auto
          gcloud compute networks vpc-access connectors describe "$CONNECTOR" --region "${REGION}" || \
          gcloud compute networks vpc-access connectors create "$CONNECTOR" --region "${REGION}" --network default --min-instances 2 --max-instances 3 --machine-type e2-standard-4

      - name: Create Cloud Run runtime service account
        run: |
          SA_NAME=cloud-run-neuropilot
          SA_EMAIL="$SA_NAME@${PROJECT_ID}.iam.gserviceaccount.com"
          gcloud iam service-accounts describe "$SA_EMAIL" || \
          gcloud iam service-accounts create "$SA_NAME" --display-name "Neuropilot Cloud Run runtime"
          gcloud projects add-iam-policy-binding "${PROJECT_ID}" --member "serviceAccount:$SA_EMAIL" --role roles/logging.logWriter || true
          gcloud projects add-iam-policy-binding "${PROJECT_ID}" --member "serviceAccount:$SA_EMAIL" --role roles/monitoring.metricWriter || true
          gcloud projects add-iam-policy-binding "${PROJECT_ID}" --member "serviceAccount:$SA_EMAIL" --role roles/datastore.user || true
          gcloud projects add-iam-policy-binding "${PROJECT_ID}" --member "serviceAccount:$SA_EMAIL" --role roles/secretmanager.secretAccessor || true
          gcloud projects add-iam-policy-binding "${PROJECT_ID}" --member "serviceAccount:$SA_EMAIL" --role roles/cloudsql.client || true
          echo "RUNTIME_SA_EMAIL=$SA_EMAIL" >> $GITHUB_ENV

      - name: Create log-based metric for 5xx
        run: |
          METRIC=cloudrun_5xx
          gcloud logging metrics describe "$METRIC" || \
          gcloud logging metrics create "$METRIC" --description="Cloud Run 5xx count" --log-filter='resource.type="cloud_run_revision" AND (httpRequest.status>=500)'

      - name: Create alert policy for 5xx spikes
        run: |
          gcloud services enable monitoring.googleapis.com || true
          POLICY_NAME="cloudrun-5xx-policy"
          gcloud monitoring policies describe "$POLICY_NAME" && EXIST=1 || EXIST=0
          if [ "$EXIST" -eq 0 ]; then
            cat > policy.json << 'JSON'
            {
              "displayName": "Cloud Run 5xx error rate",
              "combiner": "OR",
              "conditions": [
                {
                  "displayName": "5xx count > 10/min",
                  "conditionMonitoringQueryLanguage": {
                    "query": "fetch cloud_run_revision | metric 'logging.googleapis.com/user/cloudrun_5xx' | alignment per_minute | every 1m | group_by [], sum | condition gt(10)"
                  }
                }
              ],
              "notificationChannels": []
            }
JSON
            gcloud monitoring policies create --policy-from-file=policy.json
          fi
