name: Nightly Firestore Backup

on:
  schedule:
    - cron: '0 2 * * *'

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      BACKUP_BUCKET: ${{ vars.BACKUP_BUCKET }}
      REGION: ${{ vars.REGION }}
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}
      - run: gcloud services enable firestore.googleapis.com
      - name: Export Firestore
        shell: bash
        run: |
          TS=$(date +%F-%H%M%S)
          gcloud firestore export "gs://${BACKUP_BUCKET}/firestore-${TS}" --project "${PROJECT_ID}"
