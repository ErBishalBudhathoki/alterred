name: Deploy Frontend to Firebase Hosting

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
        working-directory: frontend/flutter_neuropilot
      - run: |
          FIREBASE_API_KEY="${{ secrets.FIREBASE_API_KEY }}"
          FIREBASE_APP_ID="${{ secrets.FIREBASE_APP_ID }}"
          FIREBASE_MESSAGING_SENDER_ID="${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}"
          FIREBASE_PROJECT_ID="${{ secrets.FIREBASE_PROJECT_ID }}"
          AUTH_DOMAIN="${FIREBASE_PROJECT_ID}.firebaseapp.com"
          STORAGE_BUCKET="${FIREBASE_PROJECT_ID}.firebasestorage.app"
          flutter build web --release \
            --dart-define=API_BASE_URL=/api \
            --dart-define=FIREBASE_API_KEY=${FIREBASE_API_KEY} \
            --dart-define=FIREBASE_APP_ID=${FIREBASE_APP_ID} \
            --dart-define=FIREBASE_MESSAGING_SENDER_ID=${FIREBASE_MESSAGING_SENDER_ID} \
            --dart-define=FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID} \
            --dart-define=FIREBASE_AUTH_DOMAIN=${AUTH_DOMAIN} \
            --dart-define=FIREBASE_STORAGE_BUCKET=${STORAGE_BUCKET}
        working-directory: frontend/flutter_neuropilot
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_NEUROPILOT_23FB5 }}"
          projectId: "neuropilot-23fb5"
          channelId: live
          entryPoint: .
      - name: Hosting rewrite smoke test
        shell: bash
        run: |
          DOMAIN=${{ vars.FIREBASE_HOSTING_DOMAIN || 'neuropilot-23fb5.web.app' }}
          echo "Testing https://${DOMAIN}/api/health"
          code=$(curl -s -o /dev/null -w "%{http_code}" "https://${DOMAIN}/api/health")
          if [ "$code" != "200" ]; then
            echo "Health endpoint behind Hosting unavailable (HTTP $code)" && exit 1
          fi
          echo "Hosting rewrite OK"
