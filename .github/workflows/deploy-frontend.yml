name: Deploy Frontend to Firebase Hosting

on:
  workflow_run:
    workflows: ["Build and Deploy Backend to Cloud Run"]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Auth via Workload Identity Federation
        if: ${{ vars.WIF_PROVIDER != '' && vars.WIF_SERVICE_ACCOUNT != '' }}
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}
      - name: Auth via Service Account JSON (fallback)
        if: ${{ vars.WIF_PROVIDER == '' || vars.WIF_SERVICE_ACCOUNT == '' }}
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_JSON }}
      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: neuropilot-23fb5
      - name: Wait for Cloud Run service to exist
        shell: bash
        run: |
          set -e
          ATTEMPTS=0
          until gcloud run services describe neuropilot-api --region australia-southeast1 --platform managed >/dev/null 2>&1; do
            ATTEMPTS=$((ATTEMPTS+1))
            if [ "$ATTEMPTS" -gt 24 ]; then
              echo "Timed out waiting for Cloud Run service neuropilot-api" >&2
              exit 1
            fi
            echo "Waiting for Cloud Run service neuropilot-api (attempt $ATTEMPTS)" && sleep 5
          done
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
        working-directory: frontend/flutter_neuropilot
      - name: Build Flutter Web
        env:
          API_BASE_URL: /api
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          flutter build web --release -t lib/main.dart \
            --dart-define=API_BASE_URL=${API_BASE_URL} \
            --dart-define=FIREBASE_API_KEY=${FIREBASE_API_KEY} \
            --dart-define=FIREBASE_APP_ID=${FIREBASE_APP_ID} \
            --dart-define=FIREBASE_MESSAGING_SENDER_ID=${FIREBASE_MESSAGING_SENDER_ID} \
            --dart-define=FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
        working-directory: frontend/flutter_neuropilot
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_NEUROPILOT_23FB5 }}"
          projectId: "neuropilot-23fb5"
          channelId: live
          entryPoint: .
      - name: Hosting rewrite smoke test
        shell: bash
        run: |
          DOMAIN="${{ vars.FIREBASE_HOSTING_DOMAIN }}"
          if [ -z "$DOMAIN" ]; then DOMAIN="neuropilot-23fb5.web.app"; fi
          echo "Testing https://${DOMAIN}/api/health"
          code=$(curl -s -o /dev/null -w "%{http_code}" "https://${DOMAIN}/api/health")
          if [ "$code" != "200" ]; then
            echo "Health endpoint behind Hosting unavailable (HTTP $code)" && exit 1
          fi
          echo "Hosting rewrite OK"
