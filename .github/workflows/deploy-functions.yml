name: Deploy Firebase Functions

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Auth to GCP (if SA JSON provided)
        if: ${{ secrets.GCP_SA_JSON != '' }}
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_JSON }}
      - name: Setup gcloud
        if: ${{ secrets.GCP_SA_JSON != '' }}
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: neuropilot-23fb5
      - name: Enable Cloud Functions API
        if: ${{ secrets.GCP_SA_JSON != '' }}
        run: |
          gcloud services enable cloudfunctions.googleapis.com || true
      - name: Write service account
        run: |
          mkdir -p credentials
          echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_NEUROPILOT_23FB5 }}" > credentials/firebase-sa.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$PWD/credentials/firebase-sa.json" >> $GITHUB_ENV
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      - name: Install deps
        working-directory: functions
        run: npm install --no-audit --no-fund
      - name: Build
        working-directory: functions
        run: npm run build
      - name: Deploy functions
        run: firebase deploy --only functions --project neuropilot-23fb5
