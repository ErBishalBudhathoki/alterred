name: Secrets Scan

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  contents: read
  id-token: write
  issues: write
  pull-requests: write

jobs:
  trufflehog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog OSS (push)
        id: trufflehog_push
        if: github.event_name == 'push'
        uses: trufflesecurity/trufflehog@v3.91.0
        continue-on-error: true
        with:
          path: ${{ github.workspace }}
          extra_args: --only-verified

      - name: TruffleHog OSS (PR)
        id: trufflehog_pr
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@v3.91.0
        continue-on-error: true
        with:
          path: ${{ github.workspace }}
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

      - name: Fail if secrets found
        if: steps.trufflehog_push.outcome == 'failure' || steps.trufflehog_pr.outcome == 'failure'
        run: exit 1