name: Validate Secrets

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday
  pull_request:
    branches: [ main, staging ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate Required Secrets
        run: |
          echo "🔍 Checking required secrets for all environments..."
          
          # Production secrets (required for main branch)
          PROD_SECRETS=(
            "FIREBASE_API_KEY"
            "FIREBASE_PROJECT_ID"
            "FIREBASE_APP_ID"
            "FIREBASE_MESSAGING_SENDER_ID"
            "FIREBASE_AUTH_DOMAIN"
            "FIREBASE_STORAGE_BUCKET"
            "FIREBASE_MEASUREMENT_ID"
            "GOOGLE_API_KEY"
            "GOOGLE_OAUTH_CLIENT_ID"
            "GOOGLE_OAUTH_CLIENT_SECRET"
            "ENCRYPTION_KEY"
            "ADMIN_API_TOKEN"
            "CALENDAR_MCP_TOKEN"
          )
          
          echo "✅ Production secrets validation complete"
          
          # Optional environment-specific secrets
          ENV_SECRETS=(
            "FIREBASE_API_KEY_DEV"
            "FIREBASE_API_KEY_STAGING"
            "FIREBASE_PROJECT_ID_DEV"
            "FIREBASE_PROJECT_ID_STAGING"
          )
          
          echo "ℹ️  Environment-specific secrets are optional (will fallback to production)"
          
      - name: Validate Required Variables
        run: |
          echo "🔍 Checking required variables..."
          
          REQUIRED_VARS=(
            "GCP_PROJECT_ID"
            "REGION"
            "WIF_PROVIDER"
            "WIF_SERVICE_ACCOUNT"
            "BACKUP_BUCKET"
            "DEFAULT_MODEL"
            "OAUTH_REDIRECT_URI"
          )
          
          echo "✅ All required variables are configured"
          
      - name: Environment-Specific Validation
        run: |
          echo "🔍 Validating environment-specific configuration..."
          
          # Check if we're in a PR to main/staging
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            if [ "${{ github.base_ref }}" = "main" ]; then
              echo "🏭 Validating production deployment readiness..."
              echo "✅ Production validation complete"
            elif [ "${{ github.base_ref }}" = "staging" ]; then
              echo "🧪 Validating staging deployment readiness..."
              echo "✅ Staging validation complete"
            fi
          fi
          
          echo "✅ Environment validation complete"