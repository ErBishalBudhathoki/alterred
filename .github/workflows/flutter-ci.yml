name: Flutter CI

on:
  push:
    branches: [ main, dev, development, staging, prod ]
  pull_request:
    branches: [ main, dev, development, staging, prod ]

jobs:
  analyze_and_test:
    runs-on: ubuntu-latest
    env:
      FIREBASE_ADMIN_SA_JSON: ${{ secrets.FIREBASE_ADMIN_SA_JSON }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: frontend/flutter_neuropilot
        run: flutter pub get

      - name: Analyze
        working-directory: frontend/flutter_neuropilot
        run: flutter analyze

      - name: Run tests with coverage
        working-directory: frontend/flutter_neuropilot
        run: flutter test --coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-coverage-${{ github.ref_name }}
          path: frontend/flutter_neuropilot/coverage/lcov.info

      - name: Write Firebase Admin SA (for server-side steps)
        if: env.FIREBASE_ADMIN_SA_JSON != ''
        env:
          SA_CONTENT: ${{ secrets.FIREBASE_ADMIN_SA_JSON }}
        run: |
          mkdir -p credentials
          python -c "
          import os, json, sys
          try:
              content = os.environ['SA_CONTENT']
              with open('credentials/firebase-admin.json', 'w') as f:
                  f.write(content)
              data = json.loads(content)
              if 'private_key' not in data:
                   print('::warning::The FIREBASE_ADMIN_SA_JSON secret might be invalid. It is missing the private_key field.')
          except Exception as e:
              print(f'::error::Failed to write/parse Firebase Admin SA JSON: {e}')
              sys.exit(1)
          "

      - name: Run tests
        working-directory: frontend/flutter_neuropilot
        run: flutter test

      - name: Run web widget tests (Chrome)
        working-directory: frontend/flutter_neuropilot
        run: flutter test --platform chrome
        continue-on-error: true

  build_web:
    runs-on: ubuntu-latest
    env:
      FIREBASE_ADMIN_SA_JSON: ${{ secrets.FIREBASE_ADMIN_SA_JSON }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: frontend/flutter_neuropilot
        run: flutter pub get

      - name: Write Firebase Admin SA (optional)
        if: env.FIREBASE_ADMIN_SA_JSON != ''
        env:
          SA_CONTENT: ${{ secrets.FIREBASE_ADMIN_SA_JSON }}
        run: |
          mkdir -p credentials
          python -c "
          import os, json, sys
          try:
              content = os.environ['SA_CONTENT']
              with open('credentials/firebase-admin.json', 'w') as f:
                  f.write(content)
              data = json.loads(content)
              if 'private_key' not in data:
                   print('::warning::The FIREBASE_ADMIN_SA_JSON secret might be invalid. It is missing the private_key field.')
          except Exception as e:
              print(f'::error::Failed to write/parse Firebase Admin SA JSON: {e}')
              sys.exit(1)
          "

      - name: Build Web
        working-directory: frontend/flutter_neuropilot
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}
        run: |
          flutter build web \
            --dart-define=FLUTTER_WEB_USE_SKIA=false \
            --dart-define=FIREBASE_API_KEY=${FIREBASE_API_KEY} \
            --dart-define=FIREBASE_APP_ID=${FIREBASE_APP_ID} \
            --dart-define=FIREBASE_MESSAGING_SENDER_ID=${FIREBASE_MESSAGING_SENDER_ID} \
            --dart-define=FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID} \
            --dart-define=FIREBASE_AUTH_DOMAIN=${FIREBASE_AUTH_DOMAIN} \
            --dart-define=FIREBASE_STORAGE_BUCKET=${FIREBASE_STORAGE_BUCKET} \
            --dart-define=FIREBASE_MEASUREMENT_ID=${FIREBASE_MEASUREMENT_ID}

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build-${{ github.ref_name }}
          path: frontend/flutter_neuropilot/build/web

  playwright_e2e:
    runs-on: ubuntu-latest
    env:
      FIREBASE_ADMIN_SA_JSON: ${{ secrets.FIREBASE_ADMIN_SA_JSON }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Flutter deps
        working-directory: frontend/flutter_neuropilot
        run: flutter pub get

      - name: Write Firebase Admin SA (optional)
        if: env.FIREBASE_ADMIN_SA_JSON != ''
        env:
          SA_CONTENT: ${{ secrets.FIREBASE_ADMIN_SA_JSON }}
        run: |
          mkdir -p credentials
          python -c "
          import os, json, sys
          try:
              content = os.environ['SA_CONTENT']
              with open('credentials/firebase-admin.json', 'w') as f:
                  f.write(content)
              data = json.loads(content)
              if 'private_key' not in data:
                   print('::warning::The FIREBASE_ADMIN_SA_JSON secret might be invalid. It is missing the private_key field.')
          except Exception as e:
              print(f'::error::Failed to write/parse Firebase Admin SA JSON: {e}')
              sys.exit(1)
          "

      - name: Build Web (env-specific)
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL || 'http://localhost:8000' }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}
        working-directory: frontend/flutter_neuropilot
        run: |
          flutter build web \
            --dart-define=FLUTTER_WEB_USE_SKIA=false \
            --dart-define=API_BASE_URL=${API_BASE_URL} \
            --dart-define=FIREBASE_API_KEY=${FIREBASE_API_KEY} \
            --dart-define=FIREBASE_APP_ID=${FIREBASE_APP_ID} \
            --dart-define=FIREBASE_MESSAGING_SENDER_ID=${FIREBASE_MESSAGING_SENDER_ID} \
            --dart-define=FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID} \
            --dart-define=FIREBASE_AUTH_DOMAIN=${FIREBASE_AUTH_DOMAIN} \
            --dart-define=FIREBASE_STORAGE_BUCKET=${FIREBASE_STORAGE_BUCKET} \
            --dart-define=FIREBASE_MEASUREMENT_ID=${FIREBASE_MEASUREMENT_ID}

      - name: Install Playwright deps
        run: |
          npm install
          npx playwright install --with-deps

      - name: Run Playwright tests (Chromium/Firefox/WebKit)
        run: npx playwright test

  build_android:
    runs-on: ubuntu-latest
    env:
      ANDROID_GOOGLE_SERVICES_JSON_DEV: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON_DEV }}
      ANDROID_GOOGLE_SERVICES_JSON_PROD: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON_PROD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: frontend/flutter_neuropilot
        run: flutter pub get

      - name: Write google-services.json for dev flavor
        if: env.ANDROID_GOOGLE_SERVICES_JSON_DEV != ''
        env:
          JSON_CONTENT: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON_DEV }}
        run: |
          mkdir -p frontend/flutter_neuropilot/android/app/src/development
          python -c "
          import os, json, sys
          try:
              content = os.environ['JSON_CONTENT']
              with open('frontend/flutter_neuropilot/android/app/src/development/google-services.json', 'w') as f:
                  f.write(content)
              data = json.loads(content)
              if 'project_info' not in data:
                  print('::warning::The google-services.json file seems to be missing project_info. Ensure this is the Android Config file, NOT the Service Account key.')
              if 'private_key' in data:
                   print('::error::The secret contains a private_key field! This looks like a Service Account Key. Please use the google-services.json from Firebase Console > Project Settings > General > Android.')
                   sys.exit(1)
          except Exception as e:
              print(f'::error::Failed to write/parse google-services.json: {e}')
              sys.exit(1)
          "

      - name: Write google-services.json for prod flavor
        if: env.ANDROID_GOOGLE_SERVICES_JSON_PROD != ''
        env:
          JSON_CONTENT: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON_PROD }}
        run: |
          mkdir -p frontend/flutter_neuropilot/android/app/src/production
          python -c "
          import os, json, sys
          try:
              content = os.environ['JSON_CONTENT']
              with open('frontend/flutter_neuropilot/android/app/src/production/google-services.json', 'w') as f:
                  f.write(content)
              data = json.loads(content)
              if 'project_info' not in data:
                  print('::warning::The google-services.json file seems to be missing project_info. Ensure this is the Android Config file, NOT the Service Account key.')
              if 'private_key' in data:
                   print('::error::The secret contains a private_key field! This looks like a Service Account Key. Please use the google-services.json from Firebase Console > Project Settings > General > Android.')
                   sys.exit(1)
          except Exception as e:
              print(f'::error::Failed to write/parse google-services.json: {e}')
              sys.exit(1)
          "

      - name: Build Android APK (development)
        working-directory: frontend/flutter_neuropilot
        run: flutter build apk --flavor development --debug

      - name: Upload Android dev APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-development-${{ github.ref_name }}
          path: frontend/flutter_neuropilot/build/app/outputs/flutter-apk/app-development-debug.apk

      - name: Build Android APK (production)
        working-directory: frontend/flutter_neuropilot
        run: flutter build apk --flavor production --debug

      - name: Upload Android prod APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-production-${{ github.ref_name }}
          path: frontend/flutter_neuropilot/build/app/outputs/flutter-apk/app-production-debug.apk
