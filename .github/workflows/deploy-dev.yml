name: Deploy to Development

on:
  push:
    branches:
      - dev
      - development
  workflow_dispatch:

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID_DEV || vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.REGION }}
  SERVICE_NAME: neuropilot-api-dev
  FIREBASE_PROJECT: ${{ vars.FIREBASE_PROJECT_ID_DEV || vars.GCP_PROJECT_ID }}

jobs:
  validate-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Validate Development Secrets
        run: |
          echo "🔍 Validating development environment secrets..."
          
          # Firebase secrets (dev)
          if [ -z "${{ secrets.FIREBASE_API_KEY_DEV }}" ]; then
            echo "⚠️  FIREBASE_API_KEY_DEV not found, falling back to production key"
            if [ -z "${{ secrets.FIREBASE_API_KEY }}" ]; then
              echo "❌ No Firebase API key available"
              exit 1
            fi
          fi
          
          echo "✅ Development secrets validated"

  deploy:
    needs: validate-secrets
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: '${{ vars.WIF_PROVIDER }}'
          service_account: '${{ vars.WIF_SERVICE_ACCOUNT }}'
          create_credentials_file: true

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # Backend Deployment
      - name: Authorize Docker push
        run: gcloud auth configure-docker

      - name: Build and Push Backend Container
        run: |
          IMAGE_TAG="gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          docker build -t "${IMAGE_TAG}" .
          docker push "${IMAGE_TAG}"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV

      - name: Deploy Backend to Cloud Run (Dev)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE_TAG }}
          flags: '--allow-unauthenticated --timeout=300 --cpu=1 --memory=1Gi --max-instances=5'
          env_vars: |
            FIREBASE_PROJECT_ID=${{ env.FIREBASE_PROJECT }}
            GCP_PROJECT_ID=${{ env.PROJECT_ID }}
            GCP_LOCATION=${{ env.REGION }}
            GOOGLE_CLOUD_PROJECT=${{ env.PROJECT_ID }}
            GOOGLE_CLOUD_LOCATION=${{ env.REGION }}
            VERTEX_AI_PROJECT_ID=${{ env.PROJECT_ID }}
            VERTEX_AI_LOCATION=${{ env.REGION }}
            FORCE_VERTEX_AI=${{ vars.FORCE_VERTEX_AI }}
            DEFAULT_MODEL=${{ vars.DEFAULT_MODEL }}
            GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
            GOOGLE_OAUTH_CLIENT_ID=${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
            GOOGLE_OAUTH_CLIENT_SECRET=${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
            ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}
            OAUTH_REDIRECT_URI=${{ vars.OAUTH_REDIRECT_URI_DEV || vars.OAUTH_REDIRECT_URI }}
            CALENDAR_MCP_TOKEN=${{ secrets.CALENDAR_MCP_TOKEN }}
            ALLOW_MCP_TOKEN_QUERY=true
            GOOGLE_CALENDAR_MCP_TOKEN_PATH=/tmp/google-calendar-mcp-tokens.json
            ADMIN_API_TOKEN=${{ secrets.ADMIN_API_TOKEN }}
            ENVIRONMENT=development

      - name: Verify Cloud Run service
        run: |
          gcloud run services describe "${{ env.SERVICE_NAME }}" --region "${{ env.REGION }}" --format="value(status.url)" || exit 1

      # Frontend Deployment
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Flutter Dependencies
        working-directory: frontend/flutter_neuropilot
        run: flutter pub get

      - name: Build Web App (Development)
        working-directory: frontend/flutter_neuropilot
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY_DEV || secrets.FIREBASE_API_KEY }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID_DEV || secrets.FIREBASE_APP_ID }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID_DEV || secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID_DEV || secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN_DEV || secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET_DEV || secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID_DEV || secrets.FIREBASE_MEASUREMENT_ID }}
        run: |
          flutter build web --release \
            --dart-define=API_BASE_URL=/api \
            --dart-define=FLUTTER_WEB_USE_SKIA=false \
            --dart-define=FIREBASE_API_KEY=${FIREBASE_API_KEY} \
            --dart-define=FIREBASE_APP_ID=${FIREBASE_APP_ID} \
            --dart-define=FIREBASE_MESSAGING_SENDER_ID=${FIREBASE_MESSAGING_SENDER_ID} \
            --dart-define=FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID} \
            --dart-define=FIREBASE_AUTH_DOMAIN=${FIREBASE_AUTH_DOMAIN} \
            --dart-define=FIREBASE_STORAGE_BUCKET=${FIREBASE_STORAGE_BUCKET} \
            --dart-define=FIREBASE_MEASUREMENT_ID=${FIREBASE_MEASUREMENT_ID} \
            --dart-define=ENVIRONMENT=development

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Frontend to Firebase Hosting (Dev)
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
        run: |
          # Use dev project if available, otherwise use main project with dev target
          firebase deploy --only hosting:dev --project ${{ env.FIREBASE_PROJECT }} || \
          firebase deploy --only hosting --project ${{ env.FIREBASE_PROJECT }}

      - name: Post Deployment Notification
        run: |
          echo "🚀 Development deployment complete!"
          echo "Backend: $(gcloud run services describe ${{ env.SERVICE_NAME }} --region ${{ env.REGION }} --format='value(status.url)')"
          echo "Frontend: https://${{ env.FIREBASE_PROJECT }}.web.app"