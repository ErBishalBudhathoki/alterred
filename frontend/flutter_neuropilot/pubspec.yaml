name: altered
description: Altered mobile-first app (Flutter) with Riverpod state management
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.5
  http: ^1.2.0
  flutter_riverpod: ^2.5.1
  intl: ^0.20.2
  flutter_localizations:
    sdk: flutter
  shared_preferences: ^2.2.2
  speech_to_text: 7.3.0
  flutter_tts: ^4.1.0
  web: ^1.1.1
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.3
  google_sign_in: ^6.2.1
  uuid: ^4.5.2
  cloud_firestore: ^5.4.4
  url_launcher: ^6.3.1
  app_links: ^6.3.2
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  generate: true
